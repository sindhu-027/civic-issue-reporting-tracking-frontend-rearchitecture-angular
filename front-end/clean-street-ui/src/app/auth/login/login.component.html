<div
  class="min-h-screen flex items-center justify-center bg-cover bg-center"
  [style.background-image]="'url(' + bgImage + ')'"
>

  <!-- Glass Box -->
  <div
    class="p-6 md:p-8 rounded-2xl w-full max-w-md
    backdrop-blur-sm bg-white/5 border border-white/20 shadow-xl
    hover:border-green-400 hover:bg-white/10 transition-all duration-500"
  >

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img
        [src]="logo"
        alt="Clean Street Logo"
        class="h-14 w-14 drop-shadow-xl"
      />
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-white drop-shadow-md mb-6">
      Login to Clean Street
    </h2>

    <!-- Login Form -->
    <form class="space-y-4" (submit)="handleLogin($event)">

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        class="w-full px-4 py-2 border border-white/30 rounded-lg
        bg-transparent text-white placeholder-white/70
        focus:outline-none focus:ring-2 focus:ring-green-400"
        required
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        class="w-full px-4 py-2 border border-white/30 rounded-lg
        bg-transparent text-white placeholder-white/70
        focus:outline-none focus:ring-2 focus:ring-green-400"
        required
      />

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-green-600 text-white py-2 rounded-lg
        hover:bg-green-700 transition disabled:opacity-50 shadow-lg"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

    </form>

    <!-- Register Link -->
    <p class="text-center text-sm text-white/90 mt-4">
      Don’t have an account?
      <a routerLink="/register" class="text-blue-400 hover:underline">
        Register
      </a>
    </p>

  </div>
</div>
