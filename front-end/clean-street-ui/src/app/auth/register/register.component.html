<div
  class="min-h-screen flex items-center justify-center bg-cover bg-center"
  [style.background-image]="'url(' + bgImage + ')'"
>

  <div class="bg-white/90 p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-md">

    <!-- Logo -->
    <div class="flex justify-center mb-4">
      <img
        [src]="logo"
        alt="Clean Street Logo"
        class="h-14 w-14"
      />
    </div>

    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
      Create an Account
    </h2>

    <!-- Profile Picture -->
    <div class="flex justify-center mb-4">
      <label for="profilePicInput" class="cursor-pointer">
        <div
          class="w-24 h-24 rounded-full border-2 border-green-500
          overflow-hidden flex items-center justify-center bg-gray-100"
        >
          <img
            *ngIf="preview"
            [src]="preview"
            class="w-full h-full object-cover"
          />
          <span *ngIf="!preview" class="text-green-500 text-3xl">
            👤
          </span>
        </div>
      </label>
    </div>

    <form class="space-y-4" (submit)="handleSubmit($event)">

      <input
        id="profilePicInput"
        type="file"
        accept="image/*"
        (change)="handleProfileChange($event)"
        class="hidden"
      />

      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
        required
        class="w-full px-4 py-2 border rounded-lg"
      />

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
        class="w-full px-4 py-2 border rounded-lg"
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
        class="w-full px-4 py-2 border rounded-lg"
      />

      <input
        type="password"
        placeholder="Confirm Password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        required
        class="w-full px-4 py-2 border rounded-lg"
      />

      <!-- Location -->
      <div>
        <label class="block text-gray-700 mb-1 font-medium">
          Location
        </label>
        <input
          type="text"
          placeholder="Enter your location"
          [value]="address"
          (input)="handleAddressChange($event)"
          [disabled]="autoDetected && address"
          class="w-full px-4 py-2 border rounded-lg"
        />
        <p class="text-xs text-gray-500 mt-1">
          {{ autoDetected ? '✅ Location detected automatically' : '📍 Enter your address manually' }}
        </p>
      </div>

      <!-- Role -->
      <select
        [(ngModel)]="role"
        name="role"
        class="w-full px-4 py-2 border rounded-lg"
      >
        <option value="user">User</option>
        <option value="volunteer">Volunteer</option>
        <option value="admin">Admin</option>
      </select>

      <button
        type="submit"
        class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700"
      >
        Register
      </button>

    </form>

    <p class="text-center text-sm text-gray-600 mt-4">
      Already have an account?
      <a routerLink="/login" class="text-green-600 hover:underline">
        Login
      </a>
    </p>

  </div>
</div>
