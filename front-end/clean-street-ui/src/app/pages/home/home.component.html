<div class="relative min-h-screen flex items-center justify-center text-white">

  <!-- Background image -->
  <div
    class="absolute inset-0 bg-cover bg-center"
    style="background-image: url('assets/images/hbg.jpg');">
  </div>

  <!-- Dark overlay -->
  <div class="absolute inset-0 bg-black/40"></div>

  <!-- Glass UI box -->
  <div
    class="relative z-10 p-10 rounded-3xl max-w-lg mx-4
           bg-white/10 backdrop-blur-md border border-white/20
           shadow-2xl text-center">

    <!-- Logo -->
    <div class="flex items-center justify-center space-x-2 mb-6">
      <img src="assets/images/logo.png" alt="logo" class="w-12 h-12" />
      <span class="text-3xl font-bold text-white">CleanStreet</span>
    </div>

    <!-- Title -->
    <h1 class="text-4xl font-bold mb-2 text-white">
      Welcome to CleanStreet
    </h1>

    <!-- Slogan -->
    <h2 class="text-xl mb-4 font-bold text-amber-300/90">
      Snap it. Share it. Solve it.
    </h2>

    <!-- Description -->
    <p class="text-lg mb-8 px-2 text-white/90">
      Report issues, track progress, and help us keep our city clean.
    </p>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row justify-center gap-4">

      <!-- IF LOGGED IN -->
      <button
        *ngIf="isLoggedIn"
        (click)="goToDashboard()"
        class="px-6 py-3 rounded-full bg-green-700 text-white
               hover:bg-green-800 transition transform hover:scale-105">
        Go to Dashboard
      </button>

      <!-- IF NOT LOGGED IN -->
      <ng-container *ngIf="!isLoggedIn">
        <button
          (click)="goToLogin()"
          class="px-6 py-3 rounded-full bg-green-600 text-white
                 hover:bg-green-700 transition transform hover:scale-105">
          Login
        </button>

        <button
          (click)="goToRegister()"
          class="px-6 py-3 rounded-full bg-green-700 text-white
                 hover:bg-green-800 transition transform hover:scale-105">
          Sign Up
        </button>
      </ng-container>

    </div>
  </div>
</div>
